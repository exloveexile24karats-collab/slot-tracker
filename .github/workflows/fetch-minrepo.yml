name: Fetch min-repo data

on:
  schedule:
    # 3:00 AM JST = 18:00 UTC (previous day)
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      stop_date:
        description: "テスト用: この日付までしか遡らない (YYYY-MM-DD)。空欄なら通常通り2026-05-15まで遡ります"
        required: false
        default: ""
      debug:
        description: "デバッグ用: 実際に読み取った差枚・出率のテキストをログに出す"
        required: false
        type: boolean
        default: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install scraper dependencies
        working-directory: scripts
        run: npm install
      - name: Run fetch
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          STOP_DATE_OVERRIDE: ${{ github.event.inputs.stop_date }}
          DEBUG_MINREPO: ${{ github.event.inputs.debug }}
        run: node fetch-minrepo.js
